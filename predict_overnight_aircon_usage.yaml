alias: Predict Overnight Aircon Usage
description: >-
  Predicts overnight energy demand and sets battery_minimum_soc_end_of_export
  based on outage reserve, base load, forecast temperature-scaled heating
  estimate, and manual boost. Shared as an example — adapt entity IDs,
  temperature thresholds, and load estimates to your own system.

# ─────────────────────────────────────────────────────────────────
# CONFIGURATION — edit these to match your system
# ─────────────────────────────────────────────────────────────────
#
# ← REPLACE all entity IDs with your own.
# Use Developer Tools → States to find the correct entity IDs.
#
# Key values to adjust:
#   - Weather entity (your local hourly weather integration)
#   - Climate entities (your HVAC/aircon controllers)
#   - battery_capacity_kwh (your usable battery capacity)
#   - base_load_kwh (your typical overnight base consumption)
#   - Temperature thresholds and heating/cooling kWh estimates
#   - Trigger time (currently 17:00)
#
# ─────────────────────────────────────────────────────────────────

triggers:
  - at: "17:00:00"         # ← ADJUST: time to run daily assessment
    trigger: time

  - entity_id:
      - weather.YOUR_WEATHER_ENTITY_HOURLY   # ← REPLACE with your hourly weather entity
    trigger: state

  - entity_id:
      - climate.YOUR_HVAC_ZONE_1     # ← REPLACE with your climate entity/entities
      - climate.YOUR_HVAC_ZONE_2     # ← REPLACE or remove if only one controller
    to:
      - heat
      - cool
    trigger: state

conditions: []

actions:
  # Step 1: Fetch hourly weather forecast
  - data:
      type: hourly
    target:
      entity_id: weather.YOUR_WEATHER_ENTITY_HOURLY   # ← REPLACE
    response_variable: forecast_response
    action: weather.get_forecasts

  # Step 2: Calculate variables
  - variables:
      forecast: "{{ forecast_response['weather.YOUR_WEATHER_ENTITY_HOURLY'].forecast }}"   # ← REPLACE

      # Extract overnight temperatures (midnight to 6am)
      overnight_temps: |-
        {% set ns = namespace(temps=[], found_midnight=false) %}
        {% for hour in forecast[:48] if hour is defined %}
          {% set forecast_time = hour.datetime | as_datetime %}
          {% set forecast_hour = forecast_time.hour %}
          {% if forecast_hour == 0 and not ns.found_midnight %}
            {% set ns.found_midnight = true %}
          {% endif %}
          {% if ns.found_midnight and forecast_hour >= 0 and forecast_hour <= 6 %}
            {% set ns.temps = ns.temps + [hour.temperature] %}
          {% endif %}
          {% if ns.found_midnight and forecast_hour == 6 %}
            {% break %}
          {% endif %}
        {% endfor %}
        {{ ns.temps }}

      # Minimum overnight temperature
      tonight_min: |-
        {% set temps = overnight_temps %}
        {% if temps | count > 0 %}
          {{ temps | min | float }}
        {% else %}
          20
        {% endif %}

      # Current indoor temperatures — add or remove zones to match your system
      indoor_temp_1: >-
        {{ state_attr('climate.YOUR_HVAC_ZONE_1', 'current_temperature') | float(22) }}
        # ← REPLACE

      indoor_temp_2: >-
        {{ state_attr('climate.YOUR_HVAC_ZONE_2', 'current_temperature') | float(22) }}
        # ← REPLACE or remove

      indoor_temp_3: >-
        {{ state_attr('climate.YOUR_HVAC_MASTER_BED', 'current_temperature') | float(22) }}
        # ← REPLACE or remove

      # Average indoor temperature — adjust divisor to match number of zones
      avg_indoor_temp: >-
        {{ ((indoor_temp_1 + indoor_temp_2 + indoor_temp_3) / 3) | round(1) }}
        # ← ADJUST: change divisor if you have more/fewer zones

      # Current HVAC modes — adjust to match your climate entities
      any_heating: >-
        {{ is_state('climate.YOUR_HVAC_ZONE_1', 'heat') or
           is_state('climate.YOUR_HVAC_ZONE_2', 'heat') }}
        # ← REPLACE

      any_cooling: >-
        {{ is_state('climate.YOUR_HVAC_ZONE_1', 'cool') or
           is_state('climate.YOUR_HVAC_ZONE_2', 'cool') }}
        # ← REPLACE

      # ── TEMPERATURE THRESHOLDS ─────────────────────────────────
      # Adjust to match your climate and comfort preferences
      cold_threshold: 10         # ← ADJUST: outdoor min below this → heating likely
      indoor_cold_threshold: 20  # ← ADJUST: indoor temp below this + cold outside → heating
      hot_threshold: 24          # ← ADJUST: outdoor min above this → cooling likely
      indoor_hot_threshold: 26   # ← ADJUST: indoor temp above this → cooling likely

      # ── AIRCON PREDICTION ─────────────────────────────────────
      expect_heating: >-
        {{ (tonight_min | float < cold_threshold and avg_indoor_temp < indoor_cold_threshold)
           or (any_heating and tonight_min | float < 14) }}

      expect_cooling: |-
        {{ tonight_min | float > hot_threshold
           or avg_indoor_temp > indoor_hot_threshold
           or (any_cooling and tonight_min | float >= 18) }}

      expect_aircon: "{{ expect_heating or expect_cooling }}"

      # ── OVERNIGHT SOC FLOOR CALCULATION ───────────────────────
      # ← ADJUST: your usable battery capacity in kWh
      # Can also use sensor.sigen_0_inverter_1_rated_battery_capacity dynamically
      battery_capacity_kwh: 32

      # ← ADJUST: your typical overnight base load kWh (lighting, standby, fridge, etc.)
      base_load_kwh: 5.7

      # Live outage reserve % from inverter setting
      outage_reserve_pct: "{{ states('number.sigen_0_plant_ess_backup_soc') | float(10) }}"  # ← REPLACE if entity differs

      # Manual boost % — set non-zero for guest nights or cold snaps
      boost_pct: "{{ states('input_number.overnight_soc_boost') | float(0) }}"

      # ── TEMPERATURE-SCALED HEATING ESTIMATE ───────────────────
      # These kWh estimates reflect one system's observed heating load.
      # Adjust the bands and kWh values to match your climate and HVAC system.
      # Note: cooling is a fixed estimate for now — revisit with real data.
      heating_kwh: |-
        {% set t = tonight_min | float(20) %}
        {% if t >= 12 %}
          {{ 0 if not expect_heating else 4 }}
        {% elif t >= 10 %}
          {{ 6 }}
        {% elif t >= 7 %}
          {{ 10 }}
        {% elif t >= 4 %}
          {{ 14 }}
        {% else %}
          {{ 18 }}
        {% endif %}

      cooling_kwh: |-
        {% if expect_cooling %}
          {{ 6 }}    {# ← ADJUST: fixed cooling estimate — replace with real data when available #}
        {% else %}
          {{ 0 }}
        {% endif %}

      aircon_kwh: |-
        {% if expect_heating %}
          {{ heating_kwh }}
        {% elif expect_cooling %}
          {{ cooling_kwh }}
        {% else %}
          {{ 0 }}
        {% endif %}

      # Convert kWh estimates to SOC %
      base_load_pct: "{{ (base_load_kwh / battery_capacity_kwh * 100) | round(0) }}"
      aircon_pct: "{{ (aircon_kwh | float / battery_capacity_kwh * 100) | round(0) }}"

      # Final floor = outage reserve + base load + aircon estimate + manual boost
      # Capped at 100%
      calculated_floor: >-
        {{ [outage_reserve_pct | float + base_load_pct | float + aircon_pct | float + boost_pct | float, 100] | min | round(0) | int }}

  # Step 3: Set aircon expected boolean
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ expect_aircon }}"
        sequence:
          - target:
              entity_id: input_boolean.aircon_expected_overnight
            action: input_boolean.turn_on
    default:
      - target:
          entity_id: input_boolean.aircon_expected_overnight
        action: input_boolean.turn_off

  # Step 4: Write calculated floor to battery minimum SOC helper
  - target:
      entity_id: input_number.battery_minimum_soc_end_of_export
    data:
      value: "{{ calculated_floor }}"
    action: input_number.set_value

  # Step 5: Log to system log
  - data:
      message: >-
        Overnight SOC floor set to {{ calculated_floor }}%

        Outage reserve: {{ outage_reserve_pct }}% | Base load: {{ base_load_pct
        }}% (~{{ base_load_kwh }} kWh) | Aircon: {{ aircon_pct }}% (~{{
        aircon_kwh }} kWh) | Boost: {{ boost_pct }}%

        Forecast min: {{ tonight_min }}°C | Heating expected: {{ expect_heating
        }} | Cooling expected: {{ expect_cooling }}

        Avg indoor temp: {{ avg_indoor_temp }}°C
      level: info
    action: system_log.write

  # Step 6: Persistent notification — full breakdown visible in HA dashboard
  - action: persistent_notification.create
    data:
      notification_id: overnight_soc_floor
      title: "🔋 Overnight SOC Floor Updated"
      message: |-
        Floor set to {{ calculated_floor }}% at {{ now().strftime('%H:%M') }}
        📊 Outage reserve: {{ outage_reserve_pct }}%
        🏠 Base load: {{ base_load_pct }}% (~{{ base_load_kwh }} kWh)
        ❄️ Aircon: {{ aircon_pct }}% (~{{ aircon_kwh }} kWh)
        ➕ Boost: {{ boost_pct }}%
        🌡️ Forecast min tonight: {{ tonight_min }}°C

mode: single
